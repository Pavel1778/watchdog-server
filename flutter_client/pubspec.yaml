name: watchdog_donor
description: Watchdog — donor camera app

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5

  # Networking
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Background / Wake
  wakelock_plus: ^1.1.4
  flutter_foreground_task: ^7.0.0
  permission_handler: ^11.2.0

  # Audio (bidirectional)
  record: ^5.1.1
  audioplayers: ^5.2.1

  # Utils
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
